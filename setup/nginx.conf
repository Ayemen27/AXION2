server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL — certbot will fill these automatically
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Root directory (React build output)
    root /var/www/axion/dist;
    index index.html;

    # Security Headers
    add_header X-Frame-Options           "SAMEORIGIN"          always;
    add_header X-Content-Type-Options    "nosniff"             always;
    add_header X-XSS-Protection          "1; mode=block"       always;
    add_header Referrer-Policy           "strict-origin"       always;
    add_header Permissions-Policy        "geolocation=()"      always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml+rss
        image/svg+xml font/woff font/woff2;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        try_files $uri =404;
    }

    # SPA — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # Logs
    access_log /var/log/nginx/axion.access.log;
    error_log  /var/log/nginx/axion.error.log;
}
