# ══════════════════════════════════════════════════════════════════════════════
# AXION — Preview Deployment for Pull Requests
# نشر معاينة مؤقتة لكل Pull Request
# ══════════════════════════════════════════════════════════════════════════════

name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    name: 🎭 Deploy Preview
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install Dependencies
        run: npm ci

      - name: 🏗️ Build for Preview
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 🚀 Deploy to Netlify/Vercel (optional)
        id: deploy
        run: |
          # يمكنك استخدام Netlify أو Vercel لنشر المعاينات
          # مثال Netlify:
          # npm install -g netlify-cli
          # netlify deploy --dir=dist --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
          
          echo "preview_url=https://pr-${{ github.event.number }}.preview.axion.dev" >> $GITHUB_OUTPUT

      - name: 💬 Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎭 Preview Deployment\n\n✅ **Preview Ready!**\n\n**URL:** ${previewUrl}\n\n**Commit:** \`${context.sha.substring(0, 7)}\`\n\n---\n\nThis preview will be updated automatically when you push new commits.`
            })

      - name: 📊 Summary
        run: |
          echo "## 🎭 Preview Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** #${{ github.event.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** ${{ steps.deploy.outputs.preview_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
