# ══════════════════════════════════════════════════════════════════════════════
# AXION — Security Scanning Workflow
# فحص أمني دوري (أسبوعياً) + على كل PR
# ══════════════════════════════════════════════════════════════════════════════

name: Security Scan

on:
  schedule:
    # يشتغل كل يوم اثنين الساعة 3 صباحاً UTC
    - cron: '0 3 * * 1'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Job 1: Dependency Audit ─────────────────────────────────────────────────
  dependency-audit:
    name: 📦 Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install Dependencies
        run: npm ci

      - name: 🔍 Run npm audit
        run: |
          npm audit --audit-level=moderate --json > audit-report.json || true
          npm audit --audit-level=moderate

      - name: 📊 Parse Audit Results
        run: |
          echo "### 📦 Dependency Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          jq -r '.metadata | "**Total Vulnerabilities:** \(.vulnerabilities.total)\n**Critical:** \(.vulnerabilities.critical)\n**High:** \(.vulnerabilities.high)\n**Moderate:** \(.vulnerabilities.moderate)\n**Low:** \(.vulnerabilities.low)"' audit-report.json >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json

  # ── Job 2: CodeQL Analysis ──────────────────────────────────────────────────
  codeql:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── Job 3: Secret Scanning ──────────────────────────────────────────────────
  secret-scan:
    name: 🔐 Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ── Job 4: License Check ────────────────────────────────────────────────────
  license-check:
    name: 📜 License Compliance
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install Dependencies
        run: npm ci

      - name: 📜 Check Licenses
        run: |
          npx license-checker --summary > licenses.txt
          echo "### 📜 License Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat licenses.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload License Report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.txt

  # ── Job 5: Summary ──────────────────────────────────────────────────────────
  summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, codeql, secret-scan, license-check]
    if: always()
    
    steps:
      - name: 📋 Generate Summary
        run: |
          echo "## 🔒 Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Audit: ${{ needs.dependency-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL Analysis: ${{ needs.codeql.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scanning: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- License Check: ${{ needs.license-check.result }}" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Security Scan Failed`,
              body: `Weekly security scan detected issues.\n\n**Scan Date:** ${new Date().toISOString()}\n\n[View Logs](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
              labels: ['security', 'automated']
            })
