# ══════════════════════════════════════════════════════════════════════════════
# AXION — Automated Release Creation
# إنشاء Releases تلقائياً عند push على tag (v1.0.0)
# ══════════════════════════════════════════════════════════════════════════════

name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'  # Matches v1.0.0, v2.1.3, etc.

jobs:
  # ── Build Artifacts ────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Release Artifacts
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install Dependencies
        run: npm ci

      - name: 🧪 Run Tests
        run: npm test || echo "No tests configured"

      - name: 🏗️ Build for Production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📦 Create Distribution Archive
        run: |
          cd dist
          tar -czf ../axion-${{ github.ref_name }}.tar.gz .
          zip -r ../axion-${{ github.ref_name }}.zip .
          cd ..

      - name: 📦 Create Source Archive
        run: |
          git archive --format=zip --prefix=axion-${{ github.ref_name }}/ HEAD > axion-source-${{ github.ref_name }}.zip
          git archive --format=tar.gz --prefix=axion-${{ github.ref_name }}/ HEAD > axion-source-${{ github.ref_name }}.tar.gz

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            axion-${{ github.ref_name }}.tar.gz
            axion-${{ github.ref_name }}.zip
            axion-source-${{ github.ref_name }}.zip
            axion-source-${{ github.ref_name }}.tar.gz

  # ── Generate Changelog ─────────────────────────────────────────────────────
  changelog:
    name: 📝 Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Generate Changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            # First release — use all commits
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            # Generate changelog from previous tag
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "## 🚀 What's Changed" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            
            # Features
            FEATURES=$(git log $PREV_TAG..HEAD --pretty=format:"%s" --grep="^feat" || echo "")
            if [ -n "$FEATURES" ]; then
              echo "### ✨ New Features" >> $GITHUB_OUTPUT
              git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="^feat" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
            fi
            
            # Fixes
            FIXES=$(git log $PREV_TAG..HEAD --pretty=format:"%s" --grep="^fix" || echo "")
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes" >> $GITHUB_OUTPUT
              git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="^fix" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
            fi
            
            # Performance
            PERF=$(git log $PREV_TAG..HEAD --pretty=format:"%s" --grep="^perf" || echo "")
            if [ -n "$PERF" ]; then
              echo "### ⚡ Performance Improvements" >> $GITHUB_OUTPUT
              git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="^perf" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
            fi
            
            # Docs
            DOCS=$(git log $PREV_TAG..HEAD --pretty=format:"%s" --grep="^docs" || echo "")
            if [ -n "$DOCS" ]; then
              echo "### 📚 Documentation" >> $GITHUB_OUTPUT
              git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="^docs" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
            fi
            
            echo "" >> $GITHUB_OUTPUT
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, changelog]
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: ./artifacts

      - name: 📋 Read Release Template
        id: template
        run: |
          if [ -f ".github/release-template.md" ]; then
            cat .github/release-template.md > release-notes.md
          else
            echo "# AXION ${{ github.ref_name }}" > release-notes.md
            echo "" >> release-notes.md
            echo "إصدار جديد من نظام AXION لإدارة العمليات" >> release-notes.md
          fi
          
          echo "" >> release-notes.md
          echo "${{ needs.changelog.outputs.changelog }}" >> release-notes.md
          
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "" >> release-notes.md
          echo "## 📦 التثبيت" >> release-notes.md
          echo "" >> release-notes.md
          echo "### من المصدر:" >> release-notes.md
          echo "\`\`\`bash" >> release-notes.md
          echo "# تحميل الكود المصدري" >> release-notes.md
          echo "wget https://github.com/${{ github.repository }}/archive/${{ github.ref_name }}.tar.gz" >> release-notes.md
          echo "tar -xzf ${{ github.ref_name }}.tar.gz" >> release-notes.md
          echo "cd axion-${{ github.ref_name }}" >> release-notes.md
          echo "" >> release-notes.md
          echo "# التثبيت والبناء" >> release-notes.md
          echo "npm install" >> release-notes.md
          echo "npm run build" >> release-notes.md
          echo "\`\`\`" >> release-notes.md
          echo "" >> release-notes.md
          echo "### النسخة المبنية (Production):" >> release-notes.md
          echo "\`\`\`bash" >> release-notes.md
          echo "# تحميل النسخة المبنية" >> release-notes.md
          echo "wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/axion-${{ github.ref_name }}.tar.gz" >> release-notes.md
          echo "tar -xzf axion-${{ github.ref_name }}.tar.gz" >> release-notes.md
          echo "\`\`\`" >> release-notes.md
          echo "" >> release-notes.md
          echo "راجع [VPS_DEPLOYMENT.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/VPS_DEPLOYMENT.md) للتعليمات الكاملة." >> release-notes.md

      - name: 🎉 Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: |
            artifacts/axion-${{ github.ref_name }}.tar.gz
            artifacts/axion-${{ github.ref_name }}.zip
            artifacts/axion-source-${{ github.ref_name }}.tar.gz
            artifacts/axion-source-${{ github.ref_name }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update CHANGELOG.md ────────────────────────────────────────────────────
  update-changelog:
    name: 📝 Update CHANGELOG.md
    runs-on: ubuntu-latest
    needs: [release, changelog]
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Update CHANGELOG.md
        run: |
          # Create CHANGELOG.md if it doesn't exist
          if [ ! -f "CHANGELOG.md" ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "جميع التغييرات المهمة في هذا المشروع سيتم توثيقها هنا." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          
          # Prepare new entry
          NEW_ENTRY=$(cat <<EOF
          
          ## [${{ github.ref_name }}] - $(date +%Y-%m-%d)
          
          ${{ needs.changelog.outputs.changelog }}
          
          EOF
          )
          
          # Insert after first line
          sed -i "1a\\$NEW_ENTRY" CHANGELOG.md

      - name: 💾 Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main

  # ── Notify ─────────────────────────────────────────────────────────────────
  notify:
    name: 📢 Notify Team
    runs-on: ubuntu-latest
    needs: release
    if: always()
    
    steps:
      - name: 📊 Release Summary
        run: |
          echo "## 🎉 Release ${{ github.ref_name }} Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
